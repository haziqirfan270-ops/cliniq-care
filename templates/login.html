{% extends "base.html" %}
{% block title %}Login - ClinIQ Care{% endblock %}
{% block body %}
<div class="brand"><h1>ClinIQ Care</h1><div class="tag">Welcome back</div></div>
<div class="card">
    <h2>Login</h2>
    <p class="meta">No registration needed - just enter a name to begin.</p>
    <form method="POST" action="{{ url_for('login') }}">
        <label for="username">Your name</label>
        <input type="text" id="username" name="username" placeholder="e.g. Haziq" required>
        <button class="btn block" type="submit">Continue</button>
    </form>
</div>
{% endblock %}
